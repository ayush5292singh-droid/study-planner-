<!DOCTYPE html>
<html>
<head>
<title>Study Genius</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<h1>🧠 Study Genius</h1>
<p>Your Smart Learning Companion</p>


<div class="cards">

<div class="card">
<h2>📚 Subjects</h2>
<h3>0</h3>
</div>


<div class="card">
<h2>✅ Tasks</h2>
<h3>0</h3>
</div>


<div class="card">
<h2>⏱ Study Time</h2>
<h3>25:00</h3>
</div>

</div>


<div class="box">

<h2>📌 Homework Tracker</h2>

<input placeholder="Enter homework">

<button>Add</button>

</div>


<div class="box">

<h2>⏰ Study Timer</h2>

<button>Start</button>
<button>Reset</button>

</div>


</div>

</body>
