<!DOCTYPE html>
<html>
<head>
<title>Study Genius</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<h1>🧠 Study Genius</h1>
<p>Your Smart Learning Companion</p>


<div class="cards">

<div class="card">
<h2>📚 Subjects</h2>
<h3>0</h3>
</div>


<div class="card">
<h2>✅ Tasks</h2>
<h3>0</h3>
</div>


<div class="card">
<h2>⏱ Study Time</h2>
<h3>25:00</h3>
</div>

</div>


<div class="box">

<h2>📌 Homework Tracker</h2>

  <input id="taskInput" placeholder="Enter homework">

<ul id="taskList"></ul>

  <button onclick="addTask()">Add</button>

</div>


<div class="box">
  
<h2>⏰ Study Timer</h2>

<h1 id="timer">25:00</h1>

<button onclick="startTimer()">Start</button>

<button onclick="resetTimer()">Reset</button>


</div>
<div class="box">

<h2>📝 My Notes</h2>

<input id="noteInput" placeholder="Write your note">

<button onclick="addNote()">Save Note</button>

<ul id="noteList"></ul>
<div class="box">

<h2>🎯 Exam Planner</h2>

<input id="examName" placeholder="Exam name">

<input id="examDate" type="date">

<button onclick="addExam()">Add Exam</button>

<ul id="examList"></ul>

</div>


<div class="box">

<h2>🏆 Daily Study Goal</h2>

<input id="goalInput" placeholder="Enter today's goal">

<button onclick="addGoal()">Add Goal</button>

<ul id="goalList"></ul>
<div class="box">

<h2>🤖 Study Assistant</h2>

<p id="advice">
Click the button for a study tip!
</p>

<button onclick="getAdvice()">
Get Study Tip
</button>

</div>


</body>
</html>l
